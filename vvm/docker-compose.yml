# Dev container for ymatch.
#
# The container runs Docker-in-Docker (dockerd starts via aidev's entrypoint),
# so the project's own docker-compose files (PostgreSQL, pgAdmin, proto-gen)
# run *inside* this container. Their published ports land on the container's
# network namespace and are forwarded to the host via the `ports` mapping below.
#
# Usage:
#   docker compose -f vm/docker-compose.yml up -d --build
#   docker exec -it ymatch_dev bash
#   # inside the container, from /home/ubuntu/ws/ymatch:
#   task test

services:
  dev:
    build: .
    image: ymatch-dev:26
    container_name: ymatch_dev
    # privileged is required for the nested dockerd.
    privileged: true
    # aidev's entrypoint starts dockerd, then `exec`s this command.
    # We also start Ollama in the background and keep the container alive.
    command: >-
      sh -c "sudo chown -R ubuntu:ubuntu /home/ubuntu/.ollama 2>/dev/null;
             ollama serve > /tmp/ollama.log 2>&1 &
             sleep infinity"
    ports:
      - "3000:3000"     # backend API (Axum)
      - "8081:8081"     # Flutter web server
      - "5432:5432"     # PostgreSQL (project docker-compose)
      - "5050:5050"     # pgAdmin (project docker-compose)
    volumes:
      - ${HOME}/ws:/home/ubuntu/ws
      - ./storage/.tmux.conf:/home/ubuntu/.tmux.conf
      - ./storage/claude:/home/ubuntu/.claude
      - ./storage/gh:/home/ubuntu/.config/gh
      - ./storage/ollama:/home/ubuntu/.ollama
      - ./storage/oci:/home/ubuntu/.oci
      - docker-data:/var/lib/docker
      - cargo-cache:/home/ubuntu/.cargo/registry
      - pub-cache:/home/ubuntu/.pub-cache
    restart: unless-stopped

volumes:
  docker-data:
  cargo-cache:
  pub-cache:
