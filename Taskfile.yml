version: "3"

vars:
  DB_CONTAINER: ymatch_db
  DB_USER: ymatch_user
  DB_PASSWORD: secure_dev_password
  DB_NAME: ymatch_test

env:
  DATABASE_URL: "postgres://{{.DB_USER}}:{{.DB_PASSWORD}}@localhost:5432/{{.DB_NAME}}"

tasks:
  # ─── Setup ──────────────────────────────────────────────────────────
  db:up:
    desc: Start PostgreSQL via Docker Compose (idempotent)
    status:
      - docker exec {{.DB_CONTAINER}} pg_isready -U {{.DB_USER}} -d ymatch
    cmds:
      - docker compose up -d db
      - echo "Waiting for PostgreSQL..."
      - |
        for i in $(seq 1 30); do
          docker exec {{.DB_CONTAINER}} pg_isready -U {{.DB_USER}} -d ymatch && exit 0
          sleep 1
        done
        echo "PostgreSQL failed to start" && exit 1

  db:ensure-test:
    desc: Create test database if it does not exist (idempotent)
    deps: [db:up]
    cmds:
      - |
        EXISTS=$(docker exec {{.DB_CONTAINER}} psql -U {{.DB_USER}} -d ymatch -tAc \
          "SELECT 1 FROM pg_database WHERE datname = '{{.DB_NAME}}'")
        if [ "$EXISTS" != "1" ]; then
          docker exec {{.DB_CONTAINER}} psql -U {{.DB_USER}} -d ymatch -c \
            "CREATE DATABASE {{.DB_NAME}} OWNER {{.DB_USER}};"
          echo "Created {{.DB_NAME}}"
        else
          echo "{{.DB_NAME}} already exists"
        fi

  # ─── Backend ────────────────────────────────────────────────────────
  backend:fmt:
    desc: Check backend code formatting
    dir: backend
    cmds:
      - cargo fmt -- --check

  backend:clippy:
    desc: Run clippy lints
    dir: backend
    cmds:
      - cargo clippy -- -D warnings

  backend:build:
    desc: Build backend
    dir: backend
    cmds:
      - cargo build

  backend:test:
    desc: Run backend integration tests (needs PostgreSQL)
    dir: backend
    deps: [db:ensure-test]
    cmds:
      - cargo test -- --test-threads=1

  backend:lint:
    desc: Run all backend lint checks (fmt + clippy)
    cmds:
      - task: backend:fmt
      - task: backend:clippy

  # ─── Frontend ───────────────────────────────────────────────────────
  frontend:deps:
    desc: Install Flutter dependencies
    dir: frontend
    cmds:
      - flutter pub get
    sources:
      - pubspec.yaml
      - pubspec.lock
    generates:
      - .dart_tool/package_config.json

  frontend:test:
    desc: Run frontend unit/widget tests (excludes integration)
    dir: frontend
    deps: [frontend:deps]
    cmds:
      - flutter test --exclude-tags=integration

  frontend:build:
    desc: Build Flutter web app
    dir: frontend
    deps: [frontend:deps]
    cmds:
      - flutter build web

  frontend:analyze:
    desc: Run Flutter static analysis
    dir: frontend
    deps: [frontend:deps]
    cmds:
      - flutter analyze

  # ─── Integration ────────────────────────────────────────────────────
  frontend:integration:
    desc: Run frontend integration tests (needs running backend)
    dir: frontend
    cmds:
      - flutter test --tags=integration

  # ─── Aggregate ──────────────────────────────────────────────────────
  test:
    desc: Run all tests (backend + frontend)
    cmds:
      - task: backend:test
      - task: frontend:test

  lint:
    desc: Run all lint checks
    cmds:
      - task: backend:lint
      - task: frontend:analyze

  ci:
    desc: Full CI pipeline (lint + build + test)
    cmds:
      - task: backend:fmt
      - task: backend:clippy
      - task: backend:build
      - task: backend:test
      - task: frontend:test
      - task: frontend:build

  # ─── Dev ────────────────────────────────────────────────────────────
  dev:backend:
    desc: Run backend dev server
    dir: backend
    env:
      DATABASE_URL: "postgres://{{.DB_USER}}:{{.DB_PASSWORD}}@localhost:5432/ymatch"
    deps: [db:up]
    cmds:
      - cargo run --bin backend

  dev:frontend:
    desc: Run frontend dev server
    dir: frontend
    deps: [frontend:deps]
    cmds:
      - flutter run -d web-server --web-port 8081
