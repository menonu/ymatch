version: "3"

vars:
  DB_CONTAINER: ymatch_db
  DB_USER: ymatch_user
  DB_PASSWORD: secure_dev_password
  DB_NAME: ymatch_test

env:
  DATABASE_URL: "postgres://{{.DB_USER}}:{{.DB_PASSWORD}}@localhost:5432/{{.DB_NAME}}"

tasks:
  # ─── Database Setup ────────────────────────────────────────────────
  db:up:
    desc: Start PostgreSQL via Docker Compose (idempotent)
    status:
      - docker exec {{.DB_CONTAINER}} pg_isready -U {{.DB_USER}} -d ymatch
    cmds:
      - docker compose up -d db
      - echo "Waiting for PostgreSQL..."
      - |
        for i in $(seq 1 30); do
          docker exec {{.DB_CONTAINER}} pg_isready -U {{.DB_USER}} -d ymatch && exit 0
          sleep 1
        done
        echo "PostgreSQL failed to start" && exit 1

  db:ensure-test:
    desc: Create test database if it does not exist (idempotent)
    deps: [db:up]
    cmds:
      - |
        EXISTS=$(docker exec {{.DB_CONTAINER}} psql -U {{.DB_USER}} -d ymatch -tAc \
          "SELECT 1 FROM pg_database WHERE datname = '{{.DB_NAME}}'")
        if [ "$EXISTS" != "1" ]; then
          docker exec {{.DB_CONTAINER}} psql -U {{.DB_USER}} -d ymatch -c \
            "CREATE DATABASE {{.DB_NAME}} OWNER {{.DB_USER}};"
          echo "Created {{.DB_NAME}}"
        else
          echo "{{.DB_NAME}} already exists"
        fi

  # ─── Tests ─────────────────────────────────────────────────────────
  backend:test:
    desc: Run backend tests (auto-starts PostgreSQL)
    dir: backend
    deps: [db:ensure-test]
    cmds:
      - cargo test -- --test-threads=1

  frontend:test:
    desc: Run frontend unit/widget tests (excludes integration + e2e)
    dir: frontend
    cmds:
      - flutter pub get
      - flutter test --exclude-tags=integration --exclude-tags=e2e

  frontend:integration:
    desc: Run frontend integration tests (needs running backend)
    dir: frontend
    cmds:
      - flutter test --tags=integration

  e2e:up:
    desc: Start the E2E stack (db + backend, no Caddy)
    cmds:
      - docker compose -f docker-compose.e2e.yml up -d --build
      - |
        for i in $(seq 1 60); do
          if curl -sf http://localhost:3000/api/v1/system/status > /dev/null; then
            echo "E2E backend up after ${i}s"
            exit 0
          fi
          sleep 1
        done
        echo "E2E backend did not come up in 60s"
        exit 1

  e2e:down:
    desc: Tear down the E2E stack and wipe its volume
    cmds:
      - docker compose -f docker-compose.e2e.yml down -v

  e2e:test:
    desc: Run the frontend-driven E2E test (#213)
    dir: frontend
    deps: [e2e:up]
    cmds:
      - flutter pub get
      - cmd: 'flutter test test/e2e/'
    env:
      E2E_API_URL: http://localhost:3000

  test:
    desc: Run all tests (backend + frontend)
    cmds:
      - task: backend:test
      - task: frontend:test

  # ─── Coverage ───────────────────────────────────────────────────────
  backend:coverage:
    desc: Generate backend coverage report (HTML + lcov.info)
    dir: backend
    deps: [db:ensure-test]
    cmds:
      - cargo llvm-cov test --no-report -- --test-threads=1
      - mkdir -p coverage
      - cargo llvm-cov report --html --output-dir coverage/html --ignore-filename-regex 'generated/'
      - cargo llvm-cov report --lcov --output-path coverage/lcov.info --ignore-filename-regex 'generated/'
      - cargo llvm-cov report --summary-only --ignore-filename-regex 'generated/'
      - cmd: 'echo "HTML:  backend/coverage/html/index.html"'
      - cmd: 'echo "lcov:  backend/coverage/lcov.info"'
