name: Deploy to OCI (Production)

on:
  push:
    tags:
      - 'release/*'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate tag format
        if: startsWith(github.ref, 'refs/tags/release/')
        run: |
          TAG="${GITHUB_REF#refs/tags/release/}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid tag format: $TAG (expected: X.Y.Z)"
            exit 1
          fi
          echo "Deploying release: $TAG"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H ${{ secrets.OCI_VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync repo to VM
        env:
          HOST: ${{ secrets.OCI_VM_HOST }}
        run: |
          ssh -i ~/.ssh/oci_key ubuntu@$HOST bash -s <<'SYNC_SCRIPT'
          set -euo pipefail
          REPO_DIR="$HOME/ymatch"
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/menonu/ymatch.git"
          # Fetch the same ref that triggered this workflow. For tag
          # pushes this is the tag name; for workflow_dispatch it's the
          # branch name.
          REF="${{ github.ref_name }}"

          if [ -d "$REPO_DIR/.git" ]; then
            echo "=== Repo already a git working tree, updating remote URL and pulling $REF ==="
            cd "$REPO_DIR"
            # Update the origin URL to use the current GITHUB_TOKEN (rotates
            # per workflow run, so the previous run's token is invalid).
            git remote set-url origin "$REPO_URL"
            git fetch origin "$REF"
            # Use FETCH_HEAD so this works for both tags and branches.
            # `git fetch origin <tag>` only populates refs/tags/<tag> and
            # FETCH_HEAD — there is no `origin/<tag>` ref, so the old
            # `git reset --hard "origin/$REF"` broke on tag pushes.
            git reset --hard FETCH_HEAD
          else
            echo "=== Cloning repo (ref=$REF) via GH_TOKEN ==="
            rm -rf "$REPO_DIR"
            git clone "$REPO_URL" "$REPO_DIR"
            cd "$REPO_DIR"
            git checkout "$REF"
          fi
          SYNC_SCRIPT

      - name: Deploy to Production
        env:
          HOST: ${{ secrets.OCI_VM_HOST }}
        run: |
          ssh -i ~/.ssh/oci_key ubuntu@$HOST bash -s <<'DEPLOY_SCRIPT'
          set -euo pipefail
          cd ~/ymatch

          # Use the new deploy script which handles env vars safely
          # (--env-file) and supports non-git working trees.
          export DB_PASSWORD="${{ secrets.OCI_DB_PASSWORD }}"

          ./scripts/oci_deploy_production.sh

          echo "=== Running production migrations ==="
          docker exec ymatch_backend ymatch_backend migrate 2>/dev/null || true
          DEPLOY_SCRIPT

      - name: Health check (Production)
        env:
          HOST: ${{ secrets.OCI_VM_HOST }}
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://${HOST}.nip.io/api/v1/system/status" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production backend healthy (attempt $i)"
              break
            fi
            echo "⏳ Waiting for production backend... (attempt $i, status: $STATUS)"
            sleep 5
          done

          FRONTEND=$(curl -sk -o /dev/null -w "%{http_code}" "https://${HOST}.nip.io/" || true)
          if [ "$FRONTEND" = "200" ]; then
            echo "✅ Production frontend healthy"
          else
            echo "⚠️ Production frontend returned $FRONTEND"
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/release/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Deployed to production.
            - URL: https://${{ secrets.OCI_VM_HOST }}.nip.io
            - Commit: ${{ github.sha }}
          draft: false
          prerelease: false

      - name: Report to New Relic
        if: always()
        run: |
          curl -s -X POST "https://insights-collector.newrelic.com/v1/accounts/${{ secrets.NEW_RELIC_ACCOUNT_ID }}/events" \
            -H "Api-Key: ${{ secrets.NEW_RELIC_LICENSE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "[{
              \"eventType\": \"Deployment\",
              \"status\": \"${{ job.status }}\",
              \"trigger\": \"${{ github.event_name }}\",
              \"commitSha\": \"${{ github.sha }}\",
              \"branch\": \"main\",
              \"target\": \"oci-production\",
              \"releaseTag\": \"${{ github.ref_name || '' }}\"
            }]" || true

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/oci_key
