name: Deploy to OCI (Production)

on:
  push:
    tags:
      - 'release/*'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate tag format
        if: startsWith(github.ref, 'refs/tags/release/')
        run: |
          TAG="${GITHUB_REF#refs/tags/release/}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid tag format: $TAG (expected: X.Y.Z)"
            exit 1
          fi
          echo "Deploying release: $TAG"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H ${{ secrets.OCI_VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Production
        env:
          HOST: ${{ secrets.OCI_VM_HOST }}
        run: |
          ssh -i ~/.ssh/oci_key ubuntu@$HOST bash -s <<'DEPLOY_SCRIPT'
          set -euo pipefail
          cd ~/ymatch

          echo "=== Pulling latest code ==="
          git fetch origin main
          git reset --hard origin/main

          echo "=== Building production containers ==="
          PUBLIC_IP=$(curl -sf http://checkip.amazonaws.com)
          export PUBLIC_IP
          export DB_PASSWORD="${{ secrets.OCI_DB_PASSWORD }}"
          export GIT_HASH=$(git rev-parse --short HEAD)

          docker compose -f docker-compose.oci.yml build \
            --build-arg API_BASE_URL="https://${PUBLIC_IP}.nip.io" \
            --build-arg GIT_HASH="$GIT_HASH" \
            backend frontend caddy

          echo "=== Restarting production services ==="
          docker compose -f docker-compose.oci.yml up -d db backend frontend caddy

          echo "=== Waiting for production services ==="
          sleep 10

          echo "=== Production service status ==="
          docker compose -f docker-compose.oci.yml ps db backend frontend caddy

          echo "=== Running production migrations ==="
          docker exec ymatch_backend ymatch_backend migrate 2>/dev/null || true
          DEPLOY_SCRIPT

      - name: Health check (Production)
        env:
          HOST: ${{ secrets.OCI_VM_HOST }}
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://${HOST}.nip.io/api/v1/system/status" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production backend healthy (attempt $i)"
              break
            fi
            echo "⏳ Waiting for production backend... (attempt $i, status: $STATUS)"
            sleep 5
          done

          FRONTEND=$(curl -sk -o /dev/null -w "%{http_code}" "https://${HOST}.nip.io/" || true)
          if [ "$FRONTEND" = "200" ]; then
            echo "✅ Production frontend healthy"
          else
            echo "⚠️ Production frontend returned $FRONTEND"
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/release/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Deployed to production.
            - URL: https://${{ secrets.OCI_VM_HOST }}.nip.io
            - Commit: ${{ github.sha }}
          draft: false
          prerelease: false

      - name: Report to New Relic
        if: always()
        run: |
          curl -s -X POST "https://insights-collector.newrelic.com/v1/accounts/${{ secrets.NEW_RELIC_ACCOUNT_ID }}/events" \
            -H "Api-Key: ${{ secrets.NEW_RELIC_LICENSE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "[{
              \"eventType\": \"Deployment\",
              \"status\": \"${{ job.status }}\",
              \"trigger\": \"${{ github.event_name }}\",
              \"commitSha\": \"${{ github.sha }}\",
              \"branch\": \"main\",
              \"target\": \"oci-production\",
              \"releaseTag\": \"${{ github.ref_name || '' }}\"
            }]" || true

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/oci_key
