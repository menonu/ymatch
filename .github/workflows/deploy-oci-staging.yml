name: Deploy to OCI (Staging)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    timeout-minutes: 60

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H ${{ secrets.OCI_STAGING_VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync repo to VM
        env:
          HOST: ${{ secrets.OCI_STAGING_VM_HOST }}
        run: |
          ssh -i ~/.ssh/oci_key ubuntu@$HOST bash -s <<'SYNC_SCRIPT'
          set -euo pipefail
          REPO_DIR="$HOME/ymatch"
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/menonu/ymatch.git"
          # Fetch the same ref that triggered this workflow, not always main.
          # For workflow_dispatch on a branch: that branch. For workflow_run
          # from CI: the head_branch of the completed CI run.
          REF="${{ github.ref_name }}"

          if [ -d "$REPO_DIR/.git" ]; then
            echo "=== Repo already a git working tree, updating remote URL and pulling $REF ==="
            cd "$REPO_DIR"
            # Update the origin URL to use the current GITHUB_TOKEN (rotates
            # per workflow run, so the previous run's token is invalid).
            git remote set-url origin "$REPO_URL"
            git fetch origin "$REF"
            git reset --hard "origin/$REF"
          else
            echo "=== Cloning repo (ref=$REF) via GH_TOKEN ==="
            rm -rf "$REPO_DIR"
            git clone "$REPO_URL" "$REPO_DIR"
            cd "$REPO_DIR"
            git checkout "$REF"
          fi
          SYNC_SCRIPT

      - name: Deploy to Staging
        env:
          HOST: ${{ secrets.OCI_STAGING_VM_HOST }}
        run: |
          ssh -i ~/.ssh/oci_key ubuntu@$HOST bash -s <<'DEPLOY_SCRIPT'
          set -euo pipefail
          cd ~/ymatch

          # Use the deploy script which handles env vars safely (--env-file)
          # and supports non-git working trees. Staging uses the same stack as
          # production; DB_PASSWORD here is the staging DB password.
          export DB_PASSWORD="${{ secrets.OCI_STAGING_DB_PASSWORD }}"

          ./scripts/oci_deploy_staging.sh

          echo "=== Running staging migrations ==="
          docker exec ymatch_backend ymatch_backend migrate 2>/dev/null || true
          DEPLOY_SCRIPT

      - name: Health check (Staging)
        env:
          HOST: ${{ secrets.OCI_STAGING_VM_HOST }}
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://${HOST}.nip.io/api/v1/system/status" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Staging backend healthy (attempt $i)"
              break
            fi
            echo "⏳ Waiting for staging backend... (attempt $i, status: $STATUS)"
            sleep 5
          done

          FRONTEND=$(curl -sk -o /dev/null -w "%{http_code}" "https://${HOST}.nip.io/" || true)
          if [ "$FRONTEND" = "200" ]; then
            echo "✅ Staging frontend healthy"
          else
            echo "⚠️ Staging frontend returned $FRONTEND"
          fi

      - name: Report to New Relic
        if: always()
        run: |
          curl -s -X POST "https://insights-collector.newrelic.com/v1/accounts/${{ secrets.NEW_RELIC_ACCOUNT_ID }}/events" \
            -H "Api-Key: ${{ secrets.NEW_RELIC_LICENSE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "[{
              \"eventType\": \"Deployment\",
              \"status\": \"${{ job.status }}\",
              \"trigger\": \"${{ github.event_name }}\",
              \"commitSha\": \"${{ github.event.workflow_run.head_sha || github.sha }}\",
              \"branch\": \"main\",
              \"target\": \"oci-staging\"
            }]" || true

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/oci_key
