name: Deploy to OCI (Staging)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    timeout-minutes: 60

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H ${{ secrets.OCI_VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync repo to VM
        env:
          HOST: ${{ secrets.OCI_VM_HOST }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/oci_key ubuntu@$HOST bash -s <<'SYNC_SCRIPT'
          set -euo pipefail
          REPO_DIR="$HOME/ymatch"

          if [ -d "$REPO_DIR/.git" ]; then
            echo "=== Repo already a git working tree, pulling latest ==="
            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main
          else
            echo "=== Cloning repo via GH_TOKEN ==="
            rm -rf "$REPO_DIR"
            git clone "https://x-access-token:${GH_TOKEN}@github.com/menonu/ymatch.git" "$REPO_DIR"
          fi
          SYNC_SCRIPT

      - name: Deploy to Staging
        env:
          HOST: ${{ secrets.OCI_VM_HOST }}
        run: |
          ssh -i ~/.ssh/oci_key ubuntu@$HOST bash -s <<'DEPLOY_SCRIPT'
          set -euo pipefail
          cd ~/ymatch

          # Use the new deploy script which handles env vars safely
          # (--env-file) and supports non-git working trees.
          export DB_PASSWORD="${{ secrets.OCI_DB_PASSWORD }}"
          export STAGING_DB_PASSWORD="${{ secrets.OCI_STAGING_DB_PASSWORD }}"

          ./scripts/oci_deploy_staging.sh

          echo "=== Running staging migrations ==="
          docker exec ymatch_staging_backend ymatch_backend migrate 2>/dev/null || true
          DEPLOY_SCRIPT

      - name: Health check (Staging)
        env:
          HOST: ${{ secrets.OCI_VM_HOST }}
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "http://${HOST}:8080/api/v1/system/status" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Staging backend healthy (attempt $i)"
              break
            fi
            echo "⏳ Waiting for staging backend... (attempt $i, status: $STATUS)"
            sleep 5
          done

          FRONTEND=$(curl -sk -o /dev/null -w "%{http_code}" "http://${HOST}:8080/" || true)
          if [ "$FRONTEND" = "200" ]; then
            echo "✅ Staging frontend healthy"
          else
            echo "⚠️ Staging frontend returned $FRONTEND"
          fi

      - name: Report to New Relic
        if: always()
        run: |
          curl -s -X POST "https://insights-collector.newrelic.com/v1/accounts/${{ secrets.NEW_RELIC_ACCOUNT_ID }}/events" \
            -H "Api-Key: ${{ secrets.NEW_RELIC_LICENSE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "[{
              \"eventType\": \"Deployment\",
              \"status\": \"${{ job.status }}\",
              \"trigger\": \"${{ github.event_name }}\",
              \"commitSha\": \"${{ github.event.workflow_run.head_sha || github.sha }}\",
              \"branch\": \"main\",
              \"target\": \"oci-staging\"
            }]" || true

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/oci_key
