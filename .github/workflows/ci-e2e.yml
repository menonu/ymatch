name: Frontend E2E

# Frontend-driven end-to-end tests (#213).
#
# Spins up the backend + PostgreSQL via docker-compose.e2e.yml, runs
# the Flutter E2E test that drives the real ApiClient, and tears down
# the stack. Slow (image build + trade-lifecycle test), so to keep the
# PR feedback loop fast this runs **post-merge on `main`** only (plus a
# manual `workflow_dispatch` for risky pre-merge runs) — see #279. PR
# validation is handled by the lighter `ci.yml` (Backend/Frontend Build
# & Test). An E2E regression therefore surfaces as a failed `main` run
# after merge, to be fixed by a follow-up; that is the accepted
# cycle-time trade-off.
#
# The E2E test exercises the wire contract that #202 broke: a real
# OfferTradeRequest is serialized with toProto3Json() (camelCase) and
# POSTed to /api/v1/matches/:id/offer. A 422 there means the
# regression has returned.

on:
  push:
    branches:
      - main
  # Manual trigger so a human can run E2E on a PR branch before merge
  # for risky changes (e.g. `gh workflow run ci-e2e.yml --ref <branch>`)
  # without making it mandatory on every PR (#279).
  workflow_dispatch:

# Base images live in our (private) ghcr.io namespace (ghcr.io/menonu/ymatch/*).
# The `docker login` step below authenticates the daemon so buildx (base
# images + the `# syntax=` frontend) and the e2e_db pull resolve via
# GITHUB_TOKEN, which reads packages in this repo — no public flip needed.
# See .github/workflows/mirror-images.yml for the mirror runbook.
permissions:
  contents: read
  # `packages: write` lets the "Ensure backend deps image" step below
  # build & push the prebuilt backend-deps base image on a cache miss
  # (new Cargo.lock). Reads still work for the e2e_db / base-image pulls.
  packages: write

jobs:
  e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to ghcr.io
        # Authenticate the Docker daemon so buildx (base images + the
        # `# syntax=` frontend) and the e2e_db pull resolve via GITHUB_TOKEN
        # instead of anonymous pulls (avoids any registry rate limit).
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        # v4 + version:latest pulls buildx >= v0.21.0, required for the
        # `type=gha` v2 cache API (the legacy v1 cache API was shut down
        # 2025-04-15). Used by the `docker buildx bake` step below to
        # persist the backend image's BuildKit layer cache across runs.
        uses: docker/setup-buildx-action@v4
        with:
          version: latest

      - name: Pull E2E DB image with retry
        run: |
          IMAGE=ghcr.io/menonu/ymatch/postgres:16-alpine
          for i in 1 2 3 4 5; do
            echo "Pull attempt $i for $IMAGE..."
            if docker pull "$IMAGE"; then
              exit 0
            fi
            sleep $((2 ** (i - 1)))
          done
          echo "Failed to pull $IMAGE after 5 attempts"
          exit 1

      - name: Ensure backend deps image
        # #276: the expensive (~100s) cargo dependency-compile layer lives
        # in a prebuilt, content-addressed base image
        # (ghcr.io/menonu/ymatch/backend-deps:<DEPS_TAG>) rather than in
        # the volatile BuildKit `type=gha` cache (which GitHub Actions'
        # 10GB LRU limit evicts, forcing full recompiles). DEPS_TAG is
        # sha256(backend/Cargo.lock) so each lockfile state has its own
        # image. On a cache hit we just `docker pull` it. On a miss (new
        # Cargo.lock) we build backend.Dockerfile.deps and push it; this
        # first build pays the ~100s once, after which every run for that
        # lockfile pulls. The buildx builder inherits the ghcr login from
        # the step above, so --push is authenticated via GITHUB_TOKEN
        # (packages: write). Exporting DEPS_TAG to $GITHUB_ENV so the
        # bake step below can pin the base image tag.
        run: |
          DEPS_TAG=$(sha256sum backend/Cargo.lock | cut -c1-16)
          echo "DEPS_TAG=$DEPS_TAG" >> "$GITHUB_ENV"
          IMG=ghcr.io/menonu/ymatch/backend-deps:$DEPS_TAG
          if docker pull "$IMG"; then
            echo "::notice::deps image cache hit: $IMG"
          else
            echo "::notice::building+pushing deps image (first build for this Cargo.lock): $IMG"
            docker buildx build -f backend.Dockerfile.deps -t "$IMG" --push .
          fi

      - name: Build and start e2e stack
        # Build the backend image via `docker buildx bake`. The dependency
        # layer now comes from the prebuilt backend-deps base image (ensured
        # above), so only the application crate is compiled here. The
        # `type=gha` cache is retained for this now-small app-build layer:
        # on a hit the `cargo build` of the app crate is restored and
        # skipped; on a miss it is only ~20s. Together this bounds the
        # build step to (deps pull | already cached) + ~20s app build +
        # apt + export, instead of the prior 100s+ dependency compile that
        # recurred whenever the gha cache was evicted.
        # `--load` makes the baked image available to the daemon so the
        # subsequent `up` reuses it instead of rebuilding. `mode=max`
        # exports intermediate layers. `type=gha` only works inside GitHub
        # Actions, so local dev uses `task e2e:up` (see docker-compose.e2e.yml).
        env:
          DEPS_TAG: ${{ env.DEPS_TAG }}
        run: |
          docker buildx bake -f docker-compose.e2e.yml \
            --set e2e_backend.args.DEPS_TAG="$DEPS_TAG" \
            --set e2e_backend.cache-from=type=gha,scope=e2e-backend \
            --set e2e_backend.cache-to=type=gha,scope=e2e-backend,mode=max \
            --load
          docker compose -f docker-compose.e2e.yml up -d e2e_db e2e_backend

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/v1/system/status > /dev/null; then
              echo "Backend up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not come up in 60s"
          docker compose -f docker-compose.e2e.yml logs e2e_backend
          exit 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            frontend/.dart_tool
          key: flutter-pub-e2e-${{ hashFiles('frontend/pubspec.lock') }}
          restore-keys: flutter-pub-e2e-

      - name: Get dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: Run E2E test
        working-directory: ./frontend
        env:
          E2E_API_URL: http://localhost:3000
        # `--run-skipped` is required: the `e2e` tag is declared with
        # `skip` in dart_test.yaml (single source of truth for "needs a
        # backend"), so without this flag these suites would be skipped
        # instead of executed against the live backend started above.
        run: flutter test test/e2e/ --run-skipped

      - name: Dump backend logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker compose -f docker-compose.e2e.yml logs backend || true
          echo "=== DB logs ==="
          docker compose -f docker-compose.e2e.yml logs db || true

      - name: Tear down stack
        if: always()
        run: |
          docker compose -f docker-compose.e2e.yml down -v
