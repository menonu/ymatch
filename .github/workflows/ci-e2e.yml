name: Frontend E2E

# Frontend-driven end-to-end tests (#213).
#
# Spins up the backend + PostgreSQL via docker-compose.e2e.yml, runs
# the Flutter E2E test that drives the real ApiClient, and tears down
# the stack. Slow (image build + trade-lifecycle test), so this is a
# separate workflow from `ci.yml` and runs only on PR + main.
#
# The E2E test exercises the wire contract that #202 broke: a real
# OfferTradeRequest is serialized with toProto3Json() (camelCase) and
# POSTed to /api/v1/matches/:id/offer. A 422 there means the
# regression has returned.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Base images live in our ghcr.io namespace (ghcr.io/menonu/ymatch/*). The
# `docker login` step below authenticates the daemon to ghcr so buildx and
# the db pull use GITHUB_TOKEN (effectively unlimited) instead of anonymous.
# `services:`-style anonymous pulls still need the packages public — see
# .github/workflows/mirror-images.yml for the one-time flip runbook.
permissions:
  contents: read
  packages: read

jobs:
  e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to ghcr.io
        # Authenticate the Docker daemon so buildx (base images + the
        # `# syntax=` frontend) and the e2e_db pull resolve via GITHUB_TOKEN
        # instead of anonymous pulls (avoids any registry rate limit).
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        # v4 + version:latest pulls buildx >= v0.21.0, required for the
        # `type=gha` v2 cache API (the legacy v1 cache API was shut down
        # 2025-04-15). Used by the `docker buildx bake` step below to
        # persist the backend image's BuildKit layer cache across runs.
        uses: docker/setup-buildx-action@v4
        with:
          version: latest

      - name: Pull E2E DB image with retry
        run: |
          IMAGE=ghcr.io/menonu/ymatch/postgres:16-alpine
          for i in 1 2 3 4 5; do
            echo "Pull attempt $i for $IMAGE..."
            if docker pull "$IMAGE"; then
              exit 0
            fi
            sleep $((2 ** (i - 1)))
          done
          echo "Failed to pull $IMAGE after 5 attempts"
          exit 1

      - name: Build and start e2e stack
        # Build the backend image via `docker buildx bake` with the GitHub
        # Actions cache backend (type=gha) so the compiled-dependency
        # layer persists across runs. On a cache hit (Cargo.lock unchanged)
        # the `cargo build` layer is restored and never executes, so
        # crates.io is not re-fetched — faster builds and no exposure to
        # transient crates.io connection resets. `--load` makes the baked
        # image available to the daemon so the subsequent `up` reuses it
        # instead of rebuilding. `mode=max` exports intermediate layers
        # (including the dep-build layer), not just the final image.
        # `type=gha` only works inside GitHub Actions, so local dev still
        # uses plain `docker compose -f docker-compose.e2e.yml up -d --build`.
        run: |
          docker buildx bake -f docker-compose.e2e.yml \
            --set e2e_backend.cache-from=type=gha,scope=e2e-backend \
            --set e2e_backend.cache-to=type=gha,scope=e2e-backend,mode=max \
            --load
          docker compose -f docker-compose.e2e.yml up -d e2e_db e2e_backend

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/v1/system/status > /dev/null; then
              echo "Backend up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not come up in 60s"
          docker compose -f docker-compose.e2e.yml logs e2e_backend
          exit 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            frontend/.dart_tool
          key: flutter-pub-e2e-${{ hashFiles('frontend/pubspec.lock') }}
          restore-keys: flutter-pub-e2e-

      - name: Get dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: Run E2E test
        working-directory: ./frontend
        env:
          E2E_API_URL: http://localhost:3000
        # `--run-skipped` is required: the `e2e` tag is declared with
        # `skip` in dart_test.yaml (single source of truth for "needs a
        # backend"), so without this flag these suites would be skipped
        # instead of executed against the live backend started above.
        run: flutter test test/e2e/ --run-skipped

      - name: Dump backend logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker compose -f docker-compose.e2e.yml logs backend || true
          echo "=== DB logs ==="
          docker compose -f docker-compose.e2e.yml logs db || true

      - name: Tear down stack
        if: always()
        run: |
          docker compose -f docker-compose.e2e.yml down -v
