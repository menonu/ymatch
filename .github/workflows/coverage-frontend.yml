name: Frontend Coverage

# Mirrors the backend coverage workflow (coverage.yml) for the
# Flutter frontend (#184, #453). Runs `flutter test --coverage`
# (excluding backend-dependent suites), drops generated sources from
# the LCOV report, and gates line coverage on a conservative floor.
#
# Runs **post-merge on `main`** only (plus a manual `workflow_dispatch`)
# to keep the PR feedback loop fast — see #279. PR validation is
# handled by the lighter `ci.yml`.

on:
  push:
    branches:
      - main
  # Manual trigger so a human can run frontend coverage on a PR branch
  # before merge for risky changes without making it mandatory on every
  # PR (#279).
  workflow_dispatch:

jobs:
  coverage:
    # Distinct from the backend "Coverage summary" job (coverage.yml)
    # so the two are unambiguous in the PR checks list.
    name: Frontend coverage summary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool
          key: flutter-pub-coverage-${{ hashFiles('pubspec.lock') }}
          restore-keys: flutter-pub-coverage-

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests with coverage
        # Excludes backend-dependent suites (integration + e2e) — they
        # need a live server. dart_test.yaml also skips these at the
        # suite level; --exclude-tags keeps the intent explicit here.
        run: flutter test --exclude-tags=integration --exclude-tags=e2e --coverage

      # Filter generated code out of lcov.info, print a markdown box to
      # GITHUB_STEP_SUMMARY, and fail if filtered line coverage is below
      # the floor. See scripts/frontend_coverage_report.sh (#453).
      #
      # Floor history:
      #   none (#184 visibility only)
      #   → 68% (#453 — post-exclusion baseline on main was ~71.5%;
      #     leave ~3 pts headroom so only real drops fail. Bump as
      #     widget coverage improves — see #454.)
      - name: Coverage summary
        working-directory: .
        env:
          # Line-coverage floor on the *filtered* set (hand-written lib/).
          THRESHOLD: "68"
        run: |
          set -euo pipefail
          raw=frontend/coverage/lcov.info
          filtered=frontend/coverage/lcov.filtered.info
          if [ ! -s "$raw" ]; then
            echo "::error::coverage/lcov.info is missing or empty"
            exit 1
          fi

          # Filters generated sources, prints human summary, fails under floor.
          scripts/frontend_coverage_report.sh "$raw" \
            --threshold "$THRESHOLD" \
            --output "$filtered"

          read -r lh lf <<< "$(awk '
            /^LF:/ { lf += substr($0, 4) }
            /^LH:/ { lh += substr($0, 4) }
            END { printf "%d %d", lh, lf }
          ' "$filtered")"
          pct=$(awk -v lh="$lh" -v lf="$lf" 'BEGIN { printf "%.2f", lh * 100 / lf }')

          {
            echo "## Frontend coverage"
            echo
            echo "Generated sources excluded: \`lib/generated/**\`, \`lib/l10n/app_localizations*.dart\`."
            echo
            echo "| Metric | Covered | Total | % | Floor |"
            echo "|---|---|---|---|---|"
            echo "| Lines (filtered) | ${lh} | ${lf} | ${pct}% | ${THRESHOLD}% |"
          } >> "$GITHUB_STEP_SUMMARY"
