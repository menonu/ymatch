name: Database Backup

on:
  schedule:
    # Daily at 18:00 UTC (03:00 JST)
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Backup type override (daily/weekly/monthly/all)'
        required: false
        default: 'daily'

env:
  # OCI Object Storage (Always Free) — see terraform/oci/backup.tf and issue #383
  OCI_BACKUP_BUCKET: ymatch-db-backups
  # OCI_HOST must be updated alongside the OCI_VM_HOST GitHub secret
  # when the VM is recreated. Both the deploy workflows and this
  # backup workflow should source from the same secret to avoid
  # drift. See docs/how_to/oci_deployment.md#github-secrets-management
  OCI_HOST: ${{ secrets.OCI_VM_HOST }}
  DB_CONTAINER: ymatch_db
  DB_USER: ymatch_user
  DB_NAME: ymatch
  # Auth for oracle-actions/run-oci-cli-command
  # Prefer the least-privilege ymatch-db-backup user (terraform/oci/backup.tf),
  # not the Terraform admin API key.
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Determine backup types
        id: types
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TYPE="${{ github.event.inputs.backup_type }}"
            if [ "$TYPE" = "all" ]; then
              echo "daily=true" >> $GITHUB_OUTPUT
              echo "weekly=true" >> $GITHUB_OUTPUT
              echo "monthly=true" >> $GITHUB_OUTPUT
            else
              # Note: do not quote $TYPE inside the test with single quotes —
              # that would compare the literal string "$TYPE".
              echo "daily=$( [ "$TYPE" = "daily" ] && echo true || echo false )" >> $GITHUB_OUTPUT
              echo "weekly=$( [ "$TYPE" = "weekly" ] && echo true || echo false )" >> $GITHUB_OUTPUT
              echo "monthly=$( [ "$TYPE" = "monthly" ] && echo true || echo false )" >> $GITHUB_OUTPUT
            fi
          else
            # Scheduled run: always daily
            echo "daily=true" >> $GITHUB_OUTPUT
            # Weekly on Sunday (day 0)
            DOW=$(date -u +%w)
            echo "weekly=$( [ $DOW -eq 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT
            # Monthly on the 1st
            DOM=$(date -u +%d)
            echo "monthly=$( [ $DOM -eq 01 ] && echo true || echo false )" >> $GITHUB_OUTPUT
          fi

          echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      - name: Resolve Object Storage namespace
        id: ns
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: os ns get
          query: data

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H ${{ env.OCI_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Create database dump
        run: |
          ssh -i ~/.ssh/oci_key -o StrictHostKeyChecking=no ubuntu@${{ env.OCI_HOST }} \
            "docker exec ${{ env.DB_CONTAINER }} pg_dump -U ${{ env.DB_USER }} ${{ env.DB_NAME }} | gzip" \
            > backup.sql.gz

          SIZE=$(stat --format=%s backup.sql.gz)
          echo "Backup size: $SIZE bytes"

          if [ "$SIZE" -lt 100 ]; then
            echo "::error::Backup file is suspiciously small ($SIZE bytes)"
            exit 1
          fi

      # silent defaults to true — avoids publishing object inventory on public logs
      - name: Upload daily backup
        if: steps.types.outputs.daily == 'true'
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: >-
            os object put
            --namespace ${{ steps.ns.outputs.raw_output }}
            --bucket-name ${{ env.OCI_BACKUP_BUCKET }}
            --name daily/ymatch-${{ steps.types.outputs.date }}.sql.gz
            --file backup.sql.gz
            --force

      - name: Upload weekly backup
        if: steps.types.outputs.weekly == 'true'
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: >-
            os object put
            --namespace ${{ steps.ns.outputs.raw_output }}
            --bucket-name ${{ env.OCI_BACKUP_BUCKET }}
            --name weekly/ymatch-${{ steps.types.outputs.date }}.sql.gz
            --file backup.sql.gz
            --force

      - name: Upload monthly backup
        if: steps.types.outputs.monthly == 'true'
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: >-
            os object put
            --namespace ${{ steps.ns.outputs.raw_output }}
            --bucket-name ${{ env.OCI_BACKUP_BUCKET }}
            --name monthly/ymatch-${{ steps.types.outputs.date }}.sql.gz
            --file backup.sql.gz
            --force

      - name: Verify daily object
        if: steps.types.outputs.daily == 'true'
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: >-
            os object head
            --namespace ${{ steps.ns.outputs.raw_output }}
            --bucket-name ${{ env.OCI_BACKUP_BUCKET }}
            --name daily/ymatch-${{ steps.types.outputs.date }}.sql.gz

      - name: Verify weekly object
        if: steps.types.outputs.weekly == 'true'
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: >-
            os object head
            --namespace ${{ steps.ns.outputs.raw_output }}
            --bucket-name ${{ env.OCI_BACKUP_BUCKET }}
            --name weekly/ymatch-${{ steps.types.outputs.date }}.sql.gz

      - name: Verify monthly object
        if: steps.types.outputs.monthly == 'true'
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: >-
            os object head
            --namespace ${{ steps.ns.outputs.raw_output }}
            --bucket-name ${{ env.OCI_BACKUP_BUCKET }}
            --name monthly/ymatch-${{ steps.types.outputs.date }}.sql.gz

      - name: Report to New Relic
        if: always()
        run: |
          STATUS="${{ job.status }}"
          curl -s -X POST "https://insights-collector.newrelic.com/v1/accounts/${{ secrets.NEW_RELIC_ACCOUNT_ID }}/events" \
            -H "Api-Key: ${{ secrets.NEW_RELIC_LICENSE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "[{
              \"eventType\": \"DatabaseBackup\",
              \"status\": \"$STATUS\",
              \"backupDate\": \"${{ steps.types.outputs.date }}\",
              \"daily\": ${{ steps.types.outputs.daily || 'false' }},
              \"weekly\": ${{ steps.types.outputs.weekly || 'false' }},
              \"monthly\": ${{ steps.types.outputs.monthly || 'false' }},
              \"sizeBytes\": $(stat --format=%s backup.sql.gz 2>/dev/null || echo 0),
              \"storage\": \"oci-object-storage\",
              \"bucket\": \"${{ env.OCI_BACKUP_BUCKET }}\"
            }]" || true

      - name: Cleanup
        if: always()
        run: rm -f backup.sql.gz ~/.ssh/oci_key
