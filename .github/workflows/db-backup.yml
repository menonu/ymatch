name: Database Backup

on:
  schedule:
    # Daily at 18:00 UTC (03:00 JST)
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Backup type override'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - monthly
          - all

env:
  # OCI Object Storage (Always Free) — see terraform/oci/backup.tf and issue #383
  OCI_BACKUP_BUCKET: ymatch-db-backups
  # OCI_HOST must be updated alongside the OCI_VM_HOST GitHub secret
  # when the VM is recreated. Both the deploy workflows and this
  # backup workflow should source from the same secret to avoid
  # drift. See docs/how_to/oci_deployment.md#github-secrets-management
  OCI_HOST: ${{ secrets.OCI_VM_HOST }}
  DB_CONTAINER: ymatch_db
  DB_USER: ymatch_user
  DB_NAME: ymatch

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Determine backup types
        id: types
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TYPE="${{ github.event.inputs.backup_type }}"
            case "$TYPE" in
              all)
                echo "daily=true" >> "$GITHUB_OUTPUT"
                echo "weekly=true" >> "$GITHUB_OUTPUT"
                echo "monthly=true" >> "$GITHUB_OUTPUT"
                ;;
              daily)
                echo "daily=true" >> "$GITHUB_OUTPUT"
                echo "weekly=false" >> "$GITHUB_OUTPUT"
                echo "monthly=false" >> "$GITHUB_OUTPUT"
                ;;
              weekly)
                echo "daily=false" >> "$GITHUB_OUTPUT"
                echo "weekly=true" >> "$GITHUB_OUTPUT"
                echo "monthly=false" >> "$GITHUB_OUTPUT"
                ;;
              monthly)
                echo "daily=false" >> "$GITHUB_OUTPUT"
                echo "weekly=false" >> "$GITHUB_OUTPUT"
                echo "monthly=true" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "::error::Invalid backup_type='$TYPE' (expected daily|weekly|monthly|all)"
                exit 1
                ;;
            esac
          else
            # Scheduled run: always daily
            echo "daily=true" >> "$GITHUB_OUTPUT"
            # Weekly on Sunday (day 0)
            DOW=$(date -u +%w)
            echo "weekly=$( [ "$DOW" -eq 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            # Monthly on the 1st
            DOM=$(date -u +%d)
            echo "monthly=$( [ "$DOM" = "01" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          fi

          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date -u +%Y%m%d_%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H ${{ env.OCI_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Create database dump
        run: |
          ssh -i ~/.ssh/oci_key -o StrictHostKeyChecking=no ubuntu@${{ env.OCI_HOST }} \
            "docker exec ${{ env.DB_CONTAINER }} pg_dump -U ${{ env.DB_USER }} ${{ env.DB_NAME }} | gzip" \
            > backup.sql.gz

          SIZE=$(stat --format=%s backup.sql.gz)
          echo "Backup size: $SIZE bytes"

          if [ "$SIZE" -lt 100 ]; then
            echo "::error::Backup file is suspiciously small ($SIZE bytes)"
            exit 1
          fi

      # Single key secret (B64). Install into a venv so PEP 668
      # (externally-managed system Python on ubuntu-24.04) cannot block pip.
      - name: Install OCI CLI
        run: |
          set -euo pipefail
          python3 -m venv "$RUNNER_TEMP/oci-cli-venv"
          "$RUNNER_TEMP/oci-cli-venv/bin/pip" install --quiet --upgrade pip
          "$RUNNER_TEMP/oci-cli-venv/bin/pip" install --quiet 'oci-cli==3.88.0'
          echo "$RUNNER_TEMP/oci-cli-venv/bin" >> "$GITHUB_PATH"

      - name: Configure OCI CLI credentials
        env:
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_KEY_CONTENT_B64: ${{ secrets.OCI_CLI_KEY_CONTENT_B64 }}
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.oci"
          KEY_FILE="$HOME/.oci/db_backup_key.pem"
          # Base64 PEM is the single source of truth (reliable multiline handling)
          echo "$OCI_CLI_KEY_CONTENT_B64" | base64 -d > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          openssl rsa -in "$KEY_FILE" -check -noout >/dev/null
          {
            echo "[DEFAULT]"
            echo "user=${OCI_CLI_USER}"
            echo "fingerprint=${OCI_CLI_FINGERPRINT}"
            echo "tenancy=${OCI_CLI_TENANCY}"
            echo "region=${OCI_CLI_REGION}"
            echo "key_file=${KEY_FILE}"
          } > "$HOME/.oci/config"
          chmod 600 "$HOME/.oci/config"
          unset OCI_CLI_USER OCI_CLI_TENANCY OCI_CLI_FINGERPRINT OCI_CLI_KEY_CONTENT_B64 OCI_CLI_REGION || true
          export OCI_CLI_CONFIG_FILE="$HOME/.oci/config"
          # Resolve namespace dynamically (do not hardcode tenancy identifiers)
          NS="$(oci os ns get --query data --raw-output)"
          echo "OCI_BACKUP_NAMESPACE=$NS" >> "$GITHUB_ENV"
          echo "Resolved Object Storage namespace (length ${#NS})"
          oci os bucket get --namespace "$NS" --bucket-name "${{ env.OCI_BACKUP_BUCKET }}" \
            --query 'data.name' --raw-output >/dev/null
          echo "Bucket access OK"

      - name: Upload and verify backups
        run: |
          set -euo pipefail
          unset OCI_CLI_USER OCI_CLI_TENANCY OCI_CLI_FINGERPRINT OCI_CLI_KEY_CONTENT_B64 OCI_CLI_REGION || true
          export OCI_CLI_CONFIG_FILE="$HOME/.oci/config"
          DATE="${{ steps.types.outputs.date }}"
          NS="${OCI_BACKUP_NAMESPACE:?namespace not set}"
          BUCKET="${{ env.OCI_BACKUP_BUCKET }}"
          LOCAL_SIZE=$(stat --format=%s backup.sql.gz)
          test -f backup.sql.gz

          DAILY="${{ steps.types.outputs.daily }}"
          WEEKLY="${{ steps.types.outputs.weekly }}"
          MONTHLY="${{ steps.types.outputs.monthly }}"
          if [ "$DAILY" != "true" ] && [ "$WEEKLY" != "true" ] && [ "$MONTHLY" != "true" ]; then
            echo "::error::No backup type selected (daily/weekly/monthly all false)"
            exit 1
          fi

          upload_and_verify() {
            local prefix="$1"
            local name="${prefix}/ymatch-${DATE}.sql.gz"
            echo "Uploading ${name} (${LOCAL_SIZE} bytes)..."
            oci os object put \
              --namespace "$NS" \
              --bucket-name "$BUCKET" \
              --name "$name" \
              --file backup.sql.gz \
              --force >/dev/null
            # head returns JSON; assert content-length matches the local dump
            REMOTE_SIZE=$(oci os object head \
              --namespace "$NS" \
              --bucket-name "$BUCKET" \
              --name "$name" | jq -r '."content-length"')
            if [ -z "$REMOTE_SIZE" ] || [ "$REMOTE_SIZE" = "null" ]; then
              echo "::error::Could not read content-length for ${name}"
              exit 1
            fi
            if [ "$REMOTE_SIZE" != "$LOCAL_SIZE" ]; then
              echo "::error::Size mismatch for ${name}: remote=${REMOTE_SIZE} local=${LOCAL_SIZE}"
              exit 1
            fi
            echo "Verified ${name} (content-length=${REMOTE_SIZE})"
          }

          if [ "$DAILY" = "true" ]; then
            upload_and_verify daily
          fi
          if [ "$WEEKLY" = "true" ]; then
            upload_and_verify weekly
          fi
          if [ "$MONTHLY" = "true" ]; then
            upload_and_verify monthly
          fi

      - name: Report to New Relic
        if: always()
        run: |
          STATUS="${{ job.status }}"
          curl -s -X POST "https://insights-collector.newrelic.com/v1/accounts/${{ secrets.NEW_RELIC_ACCOUNT_ID }}/events" \
            -H "Api-Key: ${{ secrets.NEW_RELIC_LICENSE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "[{
              \"eventType\": \"DatabaseBackup\",
              \"status\": \"$STATUS\",
              \"backupDate\": \"${{ steps.types.outputs.date }}\",
              \"daily\": ${{ steps.types.outputs.daily || 'false' }},
              \"weekly\": ${{ steps.types.outputs.weekly || 'false' }},
              \"monthly\": ${{ steps.types.outputs.monthly || 'false' }},
              \"sizeBytes\": $(stat --format=%s backup.sql.gz 2>/dev/null || echo 0),
              \"storage\": \"oci-object-storage\",
              \"bucket\": \"${{ env.OCI_BACKUP_BUCKET }}\"
            }]" || true

      - name: Cleanup
        if: always()
        run: rm -f backup.sql.gz ~/.ssh/oci_key ~/.oci/db_backup_key.pem ~/.oci/config
