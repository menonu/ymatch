name: Prod Key Inject (temporary break-glass)

# TEMPORARY incident-response workflow. SSHes into prod (using the existing
# OCI_SSH_PRIVATE_KEY secret) and appends a caller-supplied PUBLIC key to the
# ubuntu user's authorized_keys, so an operator can open an interactive SSH
# session for diagnosis over a private channel (instead of printing prod data
# to these world-readable GHA logs). Public keys are non-secret. Prints NO
# production data. Revert after the incident is resolved.

on:
  workflow_dispatch:
    inputs:
      pubkey:
        description: 'SSH public key to authorize on the prod VM (ubuntu user)'
        required: true

jobs:
  inject:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H ${{ secrets.OCI_VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Append public key to prod authorized_keys (idempotent)
        env:
          PUBKEY: ${{ inputs.pubkey }}
        run: |
          printf '%s\n' "$PUBKEY" > /tmp/pubkey
          ssh -i ~/.ssh/oci_key -o StrictHostKeyChecking=no ubuntu@${{ secrets.OCI_VM_HOST }} \
            'mkdir -p ~/.ssh && chmod 700 ~/.ssh && touch ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys && KEY=$(cat) && grep -qF "$KEY" ~/.ssh/authorized_keys || printf "%s\n" "$KEY" >> ~/.ssh/authorized_keys && echo OK-key-injected' \
            < /tmp/pubkey
          rm -f /tmp/pubkey

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/oci_key