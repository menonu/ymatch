name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ymatch_user
          POSTGRES_PASSWORD: secure_dev_password
          POSTGRES_DB: ymatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ymatch_user -d ymatch_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://ymatch_user:secure_dev_password@localhost:5432/ymatch_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Pinned to a specific stable for reproducibility across
          # contributors and CI. Bump deliberately. (Drops the false
          # rust-version=1.85 MSRV pin — see #183.)
          toolchain: 1.96.0
          components: clippy, rustfmt

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
          shared-key: backend
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true

      - name: Run fmt
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose -- --test-threads=1

  frontend-test:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            frontend/.dart_tool
          key: flutter-pub-${{ hashFiles('frontend/pubspec.lock') }}
          restore-keys: flutter-pub-

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        # Bare `flutter test` — backend-dependent suites (integration +
        # e2e) are skipped at the suite level by dart_test.yaml, the
        # single source of truth. No `--exclude-tags` enumeration here.
        run: flutter test

      - name: Build web
        run: flutter build web
