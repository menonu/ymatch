name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ymatch_user
          POSTGRES_PASSWORD: secure_dev_password
          POSTGRES_DB: ymatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ymatch_user -d ymatch"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config postgresql-client

      - name: Create test database
        env:
          PGPASSWORD: secure_dev_password
        run: |
          until pg_isready -h localhost -p 5432 -U ymatch_user -d ymatch; do
            sleep 1
          done
          psql -h localhost -U ymatch_user -d ymatch -c "CREATE DATABASE ymatch_test OWNER ymatch_user;"

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./backend

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        env:
          DATABASE_URL: postgres://ymatch_user:secure_dev_password@localhost:5432/ymatch_test
        run: cargo test --verbose -- --test-threads=1

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run fmt
        run: cargo fmt -- --check

  frontend-test:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build web
        run: flutter build web
