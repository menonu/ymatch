name: New Relic GitHub Actions Exporter

on:
  workflow_run:
    # Include post-merge E2E + coverage (#281) so main-branch failures
    # appear in NR telemetry alongside CI/deploy/backup. Discord
    # alerting for those failures is handled directly by
    # notify-main-failure.yml (hybrid path; independent of NR alerts).
    workflows:
      - CI
      - Deploy to OCI (Production)
      - Deploy to OCI (Staging)
      - Database Backup
      - Frontend E2E
      - Backend Coverage
      - Frontend Coverage
    types: [completed]

permissions:
  actions: read
  contents: read

env:
  GHA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
  GHA_RUN_ID: ${{ github.event.workflow_run.id }}
  GHA_RUN_NAME: ${{ github.event.workflow_run.name }}

jobs:
  new-relic-exporter:
    name: Export telemetry to New Relic
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v5
      - name: New Relic Exporter
        # v1.0.8+ pins ghapi==1.0.10 (sync). @1.0.1 had unpinned ghapi and
        # broke when ghapi 2.0 made GhApi async by default (#382).
        uses: newrelic-experimental/gha-new-relic-exporter@v1.0.8
