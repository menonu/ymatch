# Single source of truth for "which suites need a live backend".
# A bare `flutter test` skips every tag declared here at the suite
# level (the file loads but no setup/tests run), so the unit job and
# `task frontend:test` can be plain `flutter test` without enumerating
# `--exclude-tags`. Intentional runners (e2e/integration) opt back in
# with `--run-skipped`.
tags:
  integration:
    skip: "Requires running backend server"
  e2e:
    skip: "Needs e2e stack (task e2e:up)"
