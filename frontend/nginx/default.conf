# Nginx server config for the Flutter web SPA (prod frontend image,
# frontend.Dockerfile.prod stage 2). Mounted at /etc/nginx/conf.d/default.conf
# by the default nginx.conf include.
#
# gzip: prod serves the Flutter web bundle uncompressed (#353 Option B / #356).
# First load is ~12.6 MB (SkWasm)–16.3 MB (CanvasKit); gzip roughly halves the
# compressible assets (main.dart.js ~3.68 MB → ~1.05 MB, the renderer .wasm
# ~7.23/3.58 MB → ~2.90/1.53 MB). Brotli is NOT available — the prod image is
# the stock nginx:alpine (ghcr.io/menonu/ymatch/nginx:alpine), which does not
# ship ngx_brotli; adding it would need a custom build, out of scope here.
#
# Caddy (Caddyfile.oci) reverse-proxies to this server. `gzip_proxied any`
# ensures compression is applied to those proxied requests regardless of Via /
# other proxy markers, and Caddy passes the gzipped response through verbatim
# (it has no `encode` directive, so it neither re-compresses nor decompresses).
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # --- gzip compression (#353 Option B / #356) ---
    # text/html is always compressed when `gzip on` and is intentionally NOT
    # listed in gzip_types (nginx forbids it there).
    #
    # gzip_static: serve the pre-compressed `.gz` sidecars baked into the image
    # at build time (frontend.Dockerfile.prod) instead of re-compressing the
    # multi-MB .js/.wasm assets on every request. The stock nginx:alpine ships
    # `--with-http_gzip_static_module`, so no module load is needed. Assets
    # without a sidecar fall back to the dynamic `gzip on` path below.
    gzip_static on;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types
        application/javascript
        application/wasm
        text/css
        text/plain
        text/xml
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/woff
        font/woff2;

    # SPA routing: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache-Control headers prevent browsers from serving stale main.dart.js
    # after a redeploy (Flutter does not hash filenames by default, so without
    # no-cache the browser may heuristically cache an older build indefinitely).
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    location ~* \.js$ {
        add_header Cache-Control "no-cache";
    }
}
