# OCI Always Free Tier — Full Stack Deployment (Production + Staging)
# Run on ARM Ampere A1 instance with Docker Compose
#
# Production: ports 80/443 (via Caddy)
# Staging:    ports 8080/8443 (via Staging Caddy)
#
# Usage:
#   PUBLIC_IP=x.x.x.x DB_PASSWORD=xxx STAGING_DB_PASSWORD=yyy docker compose -f docker-compose.oci.yml up -d --build

services:
  # ===================================================
  # PRODUCTION
  # ===================================================

  # --- Production PostgreSQL ---
  db:
    image: postgres:16-alpine
    container_name: ymatch_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ymatch_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD env var}
      POSTGRES_DB: ymatch
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - ymatch
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ymatch_user -d ymatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Production Backend ---
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile.prod
      args:
        GIT_HASH: ${GIT_HASH:-unknown}
    container_name: ymatch_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://ymatch_user:${DB_PASSWORD}@db:5432/ymatch"
      RUST_LOG: info
      PORT: "3000"
      IMAGE_STORAGE: local
    volumes:
      - uploads:/app/uploads
    networks:
      - ymatch
    depends_on:
      db:
        condition: service_healthy

  # --- Production Frontend ---
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile.prod
      args:
        API_BASE_URL: ""
        GIT_HASH: ${GIT_HASH:-unknown}
    container_name: ymatch_frontend
    restart: unless-stopped
    networks:
      - ymatch

  # --- Production Caddy (ports 80/443) ---
  caddy:
    image: caddy:2-alpine
    container_name: ymatch_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.oci:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      PUBLIC_IP: ${PUBLIC_IP:?Set PUBLIC_IP env var}
    networks:
      - ymatch
    depends_on:
      - backend
      - frontend

  # ===================================================
  # STAGING
  # ===================================================

  # --- Staging PostgreSQL ---
  staging_db:
    image: postgres:16-alpine
    container_name: ymatch_staging_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ymatch_user
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD:?Set STAGING_DB_PASSWORD env var}
      POSTGRES_DB: ymatch_staging
    volumes:
      - staging_pg_data:/var/lib/postgresql/data
    networks:
      - ymatch_staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ymatch_user -d ymatch_staging"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Staging Backend ---
  staging_backend:
    build:
      context: .
      dockerfile: backend.Dockerfile.prod
      args:
        GIT_HASH: ${GIT_HASH:-unknown}
    container_name: ymatch_staging_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://ymatch_user:${STAGING_DB_PASSWORD}@staging_db:5432/ymatch_staging"
      RUST_LOG: info
      PORT: "3000"
      IMAGE_STORAGE: local
    volumes:
      - staging_uploads:/app/uploads
    networks:
      - ymatch_staging
    depends_on:
      staging_db:
        condition: service_healthy

  # --- Staging Frontend ---
  staging_frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile.prod
      args:
        API_BASE_URL: ""
        GIT_HASH: ${GIT_HASH:-unknown}
    container_name: ymatch_staging_frontend
    restart: unless-stopped
    networks:
      - ymatch_staging

  # --- Staging Caddy (ports 8080/8443) ---
  staging_caddy:
    image: caddy:2-alpine
    container_name: ymatch_staging_caddy
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./Caddyfile.oci.staging:/etc/caddy/Caddyfile:ro
      - staging_caddy_data:/data
      - staging_caddy_config:/config
    environment:
      PUBLIC_IP: ${PUBLIC_IP:?Set PUBLIC_IP env var}
    networks:
      - ymatch_staging
    depends_on:
      - staging_backend
      - staging_frontend

networks:
  ymatch:
    driver: bridge
  ymatch_staging:
    driver: bridge

volumes:
  # Production
  pg_data:
  uploads:
  caddy_data:
  caddy_config:
  # Staging
  staging_pg_data:
  staging_uploads:
  staging_caddy_data:
  staging_caddy_config:
