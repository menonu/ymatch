syntax = "proto3";

package ymatch;

option go_package = "gen/ymatch";

// Core Models
message User {
  int32 id = 1;
  string username = 2;
  optional string uuid = 3;
  optional string device_token = 4;
  optional string created_at = 5;
  optional string role = 6; // "user", "moderator", "admin"
  optional bool is_banned = 7;
  optional string ban_reason = 8;
  optional string banned_until = 9;
}

message Event {
  int32 id = 1;
  string name = 2;
  optional int32 creator_id = 3;
  optional string created_at = 4;
  optional int32 unique_views = 5;
  optional int32 active_participants = 6;
  optional bool is_favorite = 7;
  optional bool is_joined = 8;
  optional string status = 9; // "draft", "published"
}

message FavoriteGroup {
  int32 user_id = 1;
  int32 event_id = 2;
  string group_name = 3;
  optional string event_name = 4; // Helpful for rendering the shortcut
}

message Merchandise {
  int32 id = 1;
  int32 event_id = 2;
  string name = 3;
  optional string photo_url = 4;
  optional string group_name = 5;
  optional string status = 7; // "draft", "published"
  optional bool is_deleted = 8;
  optional bool trade_enabled = 9;
  optional int32 creator_id = 10;
  optional string group_description = 11; // mirrored from merchandise_groups; empty if unset
}

message MerchandiseGroup {
  int32 id = 1;
  int32 event_id = 2;
  string group_name = 3;
  optional string description = 4;
  optional int32 created_by = 5;
  optional string created_at = 6;
  optional string updated_at = 7;
  optional string photo_url = 8; // optional description image (#404)
}

message InventoryItem {
  int32 id = 1;
  int32 user_id = 2;
  int32 merch_id = 3;
  string status = 4; // "HAVE" or "WANT"
  int32 quantity = 5;
  optional string merch_name = 6;
  optional string photo_url = 7;
  optional string group_name = 8;
}

message TradeMatch {
  int32 id = 1;
  int32 user1_id = 2;
  int32 user2_id = 3;
  string status = 4; // "PENDING", "OFFERED", "ACCEPTED", "COMPLETED", "REJECTED"
  optional string created_at = 5;

  optional User other_user = 6;
  repeated InventoryItem user_haves = 7;  // potential items to give
  repeated InventoryItem user_wants = 8;  // potential items to receive
  optional int32 offered_by = 9;
  repeated MatchItem selected_items = 10; // items selected in offer/accept
  bool inventory_applied = 11; // true if inventory update already executed
  optional string group_name = 12; // the match's single item group (ADR 0001, #322)
  optional string event_name = 13; // parent event name of the match's group (#322)
}

message MatchItem {
  int32 id = 1;
  int32 match_id = 2;
  int32 merch_id = 3;
  int32 giver_user_id = 4; // the user who gives this leg
  reserved 5; // was `direction` ("GIVE"/"RECEIVE"); legs are absolute now (#297)
  int32 quantity = 6;
  optional string merch_name = 7;
  optional string photo_url = 8;
}

// Request/Response Models
message GuestLoginRequest {
  string uuid = 1;
  optional string device_token = 2;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message CreateUserRequest {
  string username = 1;
  string password = 2;
  optional string device_token = 3;
}

message CreateEventRequest {
  string name = 1;
  int32 creator_id = 2;
  optional string status = 3; // "draft" or "published" (default: "published")
}

message UpdateEventRequest {
  int32 user_id = 1;
  optional string name = 2;
}

message ToggleFavoriteRequest {
  int32 user_id = 1;
  bool is_favorite = 2;
}

message ToggleFavoriteGroupRequest {
  int32 user_id = 1;
  string group_name = 2;
  bool is_favorite = 3;
}

message UpdateInventoryRequest {
  int32 user_id = 1;
  int32 merch_id = 2;
  string status = 3;
  int32 quantity = 4;
}

message CreateMerchRequest {
  string name = 1;
  optional string photo_url = 2;
  optional string group_name = 3;
  optional int32 creator_id = 4;
  optional string status = 5; // "draft" or "published" (default: "published")
}

message UpdateMerchRequest {
  int32 user_id = 1;
  optional string name = 2;
  optional string photo_url = 3;
  optional string group_name = 4;
}

message UpdateMatchStatusRequest {
  string status = 1; // "ACCEPTED", "REJECTED", "COMPLETED"
  int32 user_id = 2; // the user accepting/rejecting/completing (#297 authz)
}

message OfferTradeRequest {
  int32 user_id = 1;
  repeated OfferItem items = 2;
}

message OfferItem {
  int32 merch_id = 1;
  int32 giver_user_id = 2; // the leg's giver: proposer for give, other participant for receive (#297)
  int32 quantity = 3; // 0 removes the leg (partial update)
}

message ApplyInventoryRequest {
  int32 user_id = 1;
}

message NotificationCounts {
  int32 pending_matches = 1;
  int32 offers_in = 2;
  int32 accepted = 3;
  int32 unread_messages = 4;
  int32 total = 5;
}

message Message {
  int32 id = 1;
  int32 match_id = 2;
  int32 sender_id = 3;
  string content = 4;
  optional string created_at = 5;
  optional string message_type = 6; // "TEXT", "LOCATION"
  optional double latitude = 7;
  optional double longitude = 8;
}

message SendMessageRequest {
  int32 match_id = 1;
  int32 sender_id = 2;
  string content = 3;
  optional string message_type = 4;
  optional double latitude = 5;
  optional double longitude = 6;
}

message SearchResult {
  string type = 1; // "event", "group", "item"
  int32 id = 2; // event_id or merch_id
  string title = 3;
  optional string subtitle = 4; // event name or group name context
  optional string photo_url = 5;
  int32 event_id = 6; // To allow navigation to the parent event
}

// Admin request types
message BanUserRequest {
  optional string reason = 1;
  optional string banned_until = 2; // ISO 8601 datetime
}

message UpdateUserRoleRequest {
  string role = 1; // "user", "moderator", "admin"
}

message UpdateUsernameRequest {
  int32 user_id = 1;
  string username = 2;
}

// Generic request with user_id for permission checks
message UserActionRequest {
  int32 user_id = 1;
}

message CreateGroupRequest {
  int32 event_id = 1;
  int32 user_id = 2;
  string group_name = 3;
  optional string description = 4;
  optional string photo_url = 5; // optional description image (#404)
}

message UpdateGroupRequest {
  int32 event_id = 1;
  int32 user_id = 2;
  string group_name = 3;
  optional string description = 4;
  // When set: update photo_url (empty string clears). When unset: leave as-is.
  optional string photo_url = 5;
}

message ListGroupsResponse {
  repeated MerchandiseGroup groups = 1;
}

// Event-member API (ADR 0004 §5, #228 PR3b): event-scoped role assignments
// for an event. `role` is "creator" or "editor". Used by the
// GET /api/v1/events/:id/members endpoint.
message EventMember {
  int32 user_id = 1;
  string role = 2; // "creator" or "editor"
  optional string username = 3;
}

message ListEventMembersResponse {
  repeated EventMember members = 1;
}

// Current-user event-role API (#366): the caller's standing on a single
// event, used by the frontend to gate the Add Merch button without reading the
// denormalized `User.role`. Accessible to any active caller (no 403 for a plain
// viewer) — unlike the creator-only `members` list, this is the per-viewer gate.
//
// `can_create_merch` is the exact decision `create_merch` enforces (via
// `RbacService::check(MerchCreate)`), so the frontend gate is the same check,
// not a re-derivation.
message MyEventRoleResponse {
  string role = 1;           // event-scoped membership: "creator", "editor", or "none"
  bool global_override = 2;  // a global admin/moderator role is in effect on this event
  bool can_create_merch = 3; // the caller may create merch on this event
}
