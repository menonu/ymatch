syntax = "proto3";

package ymatch;

option go_package = "gen/ymatch";

// Core Models
message User {
  int32 id = 1;
  string username = 2;
  optional string uuid = 3;
  optional string device_token = 4;
  optional string created_at = 5;
}

message Event {
  int32 id = 1;
  string name = 2;
  optional int32 creator_id = 3;
  optional string created_at = 4;
  optional int32 unique_views = 5;
  optional int32 active_participants = 6;
  optional bool is_favorite = 7;
}

message Merchandise {
  int32 id = 1;
  int32 event_id = 2;
  string name = 3;
  optional string photo_url = 4;
  optional string group_name = 5;
  optional int32 sort_order = 6;
}

message InventoryItem {
  int32 id = 1;
  int32 user_id = 2;
  int32 merch_id = 3;
  string status = 4; // "HAVE" or "WANT"
  int32 quantity = 5;
  optional string merch_name = 6;
  optional string photo_url = 7;
  optional string group_name = 8;
}

message TradeMatch {
  int32 id = 1;
  int32 user1_id = 2;
  int32 user2_id = 3;
  string status = 4; // "PROPOSED", "ACCEPTED", "REJECTED", "COMPLETED"
  optional string created_at = 5;

  optional User other_user = 6;
  repeated InventoryItem user_haves = 7;
  repeated InventoryItem user_wants = 8;
}

// Request/Response Models
message GuestLoginRequest {
  string uuid = 1;
  optional string device_token = 2;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message CreateUserRequest {
  string username = 1;
  string password = 2;
  optional string device_token = 3;
}

message CreateEventRequest {
  string name = 1;
  int32 creator_id = 2;
}

message UpdateInventoryRequest {
  int32 user_id = 1;
  int32 merch_id = 2;
  string status = 3;
  int32 quantity = 4;
}

message UpdateMerchSortOrderRequest {
  int32 event_id = 1;
  map<int32, int32> sort_orders = 2; // merch_id -> sort_order
}

message CreateMerchRequest {
  string name = 1;
  optional string photo_url = 2;
  optional string group_name = 3;
}

message UpdateMatchStatusRequest {
  string status = 1; // "ACCEPTED", "REJECTED", "COMPLETED"
}

message Message {
  int32 id = 1;
  int32 match_id = 2;
  int32 sender_id = 3;
  string content = 4;
  optional string created_at = 5;
}

message SendMessageRequest {
  int32 match_id = 1;
  int32 sender_id = 2;
  string content = 3;
}
